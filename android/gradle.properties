# Heap sized for low-RAM machines (~7GB total). -Xmx8G previously OOM-killed
# the Gradle daemon ("daemon disappeared"). 2G heap + 1G metaspace leaves room
# for the Dart compiler, adb, and the OS during a Flutter build.
org.gradle.jvmargs=-Xmx2048M -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
org.gradle.daemon=true
org.gradle.caching=true
