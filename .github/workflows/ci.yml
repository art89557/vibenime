name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  analyze-and-test:
    name: Analyze + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build-apk:
    name: Build Android APK (debug)
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      # .env tidak di-commit; buat placeholder agar dotenv load tidak gagal.
      # App tetap jalan (fallback Mux) tanpa kredensial nyata.
      - name: Create placeholder .env
        run: |
          cat > .env <<'EOF'
          SUPABASE_URL=
          SUPABASE_ANON_KEY=
          ANIME_API_URL=
          EOF

      - name: Build debug APK
        run: flutter build apk --debug
