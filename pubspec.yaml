name: vibenime
description: "VibeNime — Aplikasi streaming anime mobile bersubtitle Indonesia."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Network
  dio: ^5.7.0
  dio_cache_interceptor: ^3.5.0
  connectivity_plus: ^6.1.0   # deteksi online/offline untuk banner + retry

  # GraphQL (AniList)
  graphql_flutter: ^5.2.0-beta.7

  # Player
  better_player_plus: ^1.0.8
  youtube_player_flutter: ^9.1.1
  share_plus: ^10.1.4

  # Auth / OAuth
  flutter_web_auth_2: ^4.0.1
  flutter_secure_storage: ^9.2.2
  webview_flutter: ^4.10.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Backend (Supabase untuk video catalog)
  supabase_flutter: ^2.5.6

  # Download & file system
  path_provider: ^2.1.5

  # Notifikasi episode baru (local, dijadwalkan di waktu airing)
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Misc
  flutter_dotenv: ^5.2.1
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1
  google_fonts: ^6.2.1
  intl: ^0.20.2
  shimmer: ^3.0.0

  # App metadata (untuk version check)
  package_info_plus: ^8.1.2

  # Image picker — upload avatar dari galeri/kamera
  image_picker: ^1.1.2

  # Advanced animations
  lottie: ^3.1.3                # Lottie JSON illustrations (empty state, onboarding)
  flutter_animate: ^4.5.2        # Chainable tweens (.fade().slide().scale())
  visibility_detector: ^0.4.0+2  # Trigger count-up animation saat scroll ke viewport

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

  # Branding (icon + native splash generators)
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  generate: true   # enable l10n codegen (lib/l10n/*.arb)
  assets:
    - .env
    - assets/icon/
    - assets/lottie/
    # Per-weight font copies named to the google_fonts API convention
    # `<Family>-<Variant>.ttf` so GoogleFonts.*() resolves them OFFLINE
    # (allowRuntimeFetching=false) instead of throwing. They are copies of the
    # variable fonts; correct weight is applied via the returned
    # TextStyle.fontWeight on the variable wght axis. Fixes the font-not-found
    # exception spam + Playfair/JetBrains fallback.
    - assets/google_fonts/

  # Bundled fonts (variable .ttf) supaya google_fonts load lokal — TANPA
  # fetch network saat startup (hilangkan jank first-paint + flash font).
  # Family name HARUS sama persis dengan yang dipakai GoogleFonts.* .
  fonts:
    - family: Playfair Display
      fonts:
        - asset: assets/fonts/PlayfairDisplay.ttf
        - asset: assets/fonts/PlayfairDisplay-Italic.ttf
          style: italic
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto.ttf
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono.ttf

# Custom launcher icon — generate dengan:
#   flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0B0E14"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"

# Native splash — generate dengan:
#   flutter pub run flutter_native_splash:create
flutter_native_splash:
  color: "#0B0E14"
  image: "assets/icon/icon_foreground.png"
  android_12:
    color: "#0B0E14"
    image: "assets/icon/icon_foreground.png"
